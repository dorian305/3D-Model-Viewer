<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "./js/threejs/src/Three.js",
                "OBJLoader": "./js/threejs/examples/jsm/loaders/OBJLoader.js",
                "MTLLoader": "./js/threejs/examples/jsm/loaders/MTLLoader.js",
                "FBXLoader": "./js/threejs/examples/jsm/loaders/FBXLoader.js",
                "STLLoader": "./js/threejs/examples/jsm/loaders/STLLoader.js",
                "OrbitControls": "./js/threejs/examples/jsm/controls/OrbitControls.js"
            }
        }
    </script>
    <script type="module" src="js/jscolor.js" defer></script>
    <script type="module" src="js/index.js" defer></script>
</head>
<body>
    <div id="controls-wrapper">
        <div class="section">
            <div class="section-heading">
                <h5>Axes</h5>
            </div>
            <div class="section-content">
                <button id="rotateX" type="button">Rotate X</button>
                <button id="rotateY" type="button">Rotate Y</button>
                <button id="rotateZ" type="button">Rotate Z</button>
            </div>
            <div class="section-content">
                <input type="number" step="0.01" id="rotationSpeedX" placeholder="X speed..." value="0">
                <input type="number" step="0.01" id="rotationSpeedY" placeholder="Y speed..." value="0">
                <input type="number" step="0.01" id="rotationSpeedZ" placeholder="Z speed..." value="0">
            </div>
            <div class="section-content">
                <button id="resetRotationX" type="button">Reset X</button>
                <button id="resetRotationY" type="button">Reset Y</button>
                <button id="resetRotationZ" type="button">Reset Z</button>
            </div>
            <div class="section-content">
                <button id="toggleAxes" type="button">Toggle axes</button>
            </div>
        </div>
        <div class="section">
            <div class="section-heading">
                <h5>Perspective</h5>
            </div>
            <div class="section-content">
                <button id="isometricView" type="button">Isometric View</button>
            </div>
            <div class="section-content">
                <button id="frontView" type="button">Front View</button>
                <button id="rearView" type="button">Rear View</button>
            </div>
            <div class="section-content">
                <button id="leftView" type="button">Left View</button>
                <button id="rightView" type="button">Right View</button>
            </div>
            <div class="section-content">
                <button id="topView" type="button">Top View</button>
                <button id="bottomView" type="button">Bottom View</button>
            </div>
        </div>
        <div class="section">
            <div class="section-heading">
                <h5>Model</h5>
            </div>
            <div class="section-content">
                <button id="display-edges" type="button" data-display="false">Show edges</button>
                <button id="display-wireframe" type="button" data-display="false">Show wireframe</button>
            </div>
            <div id="parts" class="section-content">
            </div>
        </div>
        <div class="section">
            <div class="section-heading">
                <h5>Enviroment</h5>
            </div>
            <div class="section-content">
                <div class="section-content-item">
                    <label>Background: </label>
                    <input type="text" id="enviroment-color" value="#000000" data-jscolor="{
                        position: 'right', width: 200, height: 100,
                        padding: 10, sliderSize: 25,
                        borderColor: '#000', controlBorderColor: '#CCC', backgroundColor: '#242424'
                    }">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
